<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <link rel="stylesheet" href="/static/app.css?v=54" />
</head>
<body>
  <div class="page game-layout um-layout">
    <section class="panel chat-panel">
      <div class="chat-header">
        <div>
          <h2>Chat</h2>
          <div class="muted">Players only</div>
        </div>
      </div>
      <div id="chat-box" class="chat-box"></div>
      <form id="chat-form" class="inline-form top-8">
        <input id="chat-input" type="text" maxlength="500" placeholder="Type a message" />
        <button type="submit">Send</button>
      </form>
      <div class="elevation-legend top-12 um-note-card">
        <h2>Um</h2>
        <div class="muted">Place nodes or draw chained paths between friendly nodes. Closed loops remove whatever they trap.</div>
      </div>
    </section>

    <section class="panel board-panel um-board-panel">
      <div class="toolbar">
        <div>
          <strong id="game-title">Um {{ game_id }}</strong>
          <div class="muted" id="share-line"></div>
        </div>
        <div class="toolbar-right">
          <span id="status-line" class="muted">Connecting…</span>
          <a class="button-link quit-link" href="/">Quit</a>
        </div>
      </div>
      <div id="board-scroll" class="board-scroll um-board-scroll"><canvas id="board" width="1100" height="900"></canvas></div>
    </section>

    <section class="panel sidebar">
      <div class="stack gap-12">
        <div>
          <h2>Turn</h2>
          <div id="turn-line"></div>
          <div id="winner-line" class="warn"></div>
        </div>

        <div class="grid two stat-grid">
          <div class="stat turn-stat" id="stat-player0"><span>Player 1</span><strong id="castle0">Castle</strong><small id="um_clock0">5:00</small></div>
          <div class="stat turn-stat" id="stat-player1"><span>Player 2</span><strong id="castle1">Castle</strong><small id="um_clock1">5:00</small></div>
          <div class="stat"><span>Your Seat</span><strong id="seat-line">Spectator</strong></div>
          <div class="stat"><span>Draft</span><strong id="segment-count">0</strong></div>
          <div class="stat"><span id="kill-label-mine">Your Kills</span><strong id="kill-mine">0</strong></div>
          <div class="stat"><span id="kill-label-opp">Enemy Kills</span><strong id="kill-opp">0</strong></div>
        </div>

        <div>
          <h2>Actions</h2>
          <div class="stack gap-8 top-8">
            <button id="commit-path" type="button">Confirm Turn</button>
            <button id="clear-draft" type="button">Clear Draft</button>
            <button id="resign" type="button">Resign</button>
          </div>
        </div>

        <div>
          <h2>Draft</h2>
          <div id="draft-line" class="muted">No draft.</div>
        </div>

        <div>
          <h2>Log</h2>
          <div id="log" class="log-box"></div>
        </div>
      </div>
    </section>
  </div>

  <script>
    window.TOPOS_GAME_ID = "{{ game_id }}";
  </script>
  <script src="/static/um.js?v=15"></script>
  <div id="um-end-popup" class="um-end-popup hidden" aria-hidden="true">
    <div id="um-end-popup-card" class="um-end-popup-card">
      <div id="um-end-popup-text">Win!</div>
    </div>
  </div>
</body>
</html>
